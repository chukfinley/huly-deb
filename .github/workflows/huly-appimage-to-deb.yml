name: Huly AppImage to Deb

on:
  schedule:
    # Check once per week (Monday 08:00 UTC)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      force_version:
        description: 'Force a specific version (e.g. 0.7.382). Leave empty to auto-detect latest.'
        required: false
        default: ''

permissions:
  contents: write

env:
  HULY_GITHUB_REPO: hcengineering/platform

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq file imagemagick

      - name: Get latest Huly version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.force_version }}" ]; then
            VERSION="${{ github.event.inputs.force_version }}"
          else
            VERSION=$(curl -s "https://api.github.com/repos/${{ env.HULY_GITHUB_REPO }}/releases/latest" \
              | jq -r '.tag_name' | sed 's/^v//')
          fi

          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::Failed to determine Huly version"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Huly version: $VERSION"

      - name: Check if release already exists
        id: check_release
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${TAG}")

          if [ "$HTTP_CODE" = "200" ] && [ -z "${{ github.event.inputs.force_version }}" ]; then
            echo "Release ${TAG} already exists, skipping."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build .deb package
        if: steps.check_release.outputs.exists == 'false'
        id: build_deb
        run: |
          chmod +x build-deb.sh
          ./build-deb.sh "${{ steps.version.outputs.version }}"
          DEB_FILE=$(ls huly_*.deb 2>/dev/null | head -1)
          echo "deb_file=$DEB_FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.version.outputs.version }}"
          name: "Huly ${{ steps.version.outputs.version }} (.deb)"
          body: |
            ## Huly ${{ steps.version.outputs.version }} — Unofficial .deb Package

            This is an **unofficial** repackaging of the [Huly](https://huly.io) desktop application
            from AppImage to `.deb` format for Debian/Ubuntu-based distributions.

            **Upstream release**: [v${{ steps.version.outputs.version }}](https://github.com/${{ env.HULY_GITHUB_REPO }}/releases/tag/v${{ steps.version.outputs.version }})

            ### Install
            ```bash
            sudo dpkg -i ${{ steps.build_deb.outputs.deb_file }}
            sudo apt-get install -f  # fix any missing dependencies
            ```

            ### Uninstall
            ```bash
            sudo apt remove huly
            ```

            ---
            *This package is automatically generated from the official Huly AppImage.
            For the official release, visit [huly.io/download](https://huly.io/download).*
          files: ${{ steps.build_deb.outputs.deb_file }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
